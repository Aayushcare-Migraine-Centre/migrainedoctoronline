<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Status</title>

    <style>
      :root {
        --primary: #83358f;
        --bg: #f4f6fb;
        --text: #333;
        --success: #28a745;
        --fail: #d9534f;
        --pending: #f0ad4e;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: var(--text);
      }

      .card {
        background: #fff;
        padding: 40px 30px;
        border-radius: 16px;
        text-align: center;
        max-width: 420px;
        width: 90%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        animation: fadeIn 0.6s ease;
      }

      h1 {
        margin: 15px 0 10px;
        color: var(--primary);
      }

      p {
        font-size: 15px;
        color: #666;
      }

      .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 26px;
        background: var(--primary);
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: 0.3s;
      }

      .btn:hover {
        background: #6a2c72;
      }

      /* Status Icons */
      .status-icon {
        width: 90px;
        height: 90px;
        margin: auto;
      }

      /* Pending Loader Animation */
      .loader {
        border: 6px solid #eee;
        border-top: 6px solid var(--pending);
        border-radius: 50%;
        width: 60px;
        height: 60px;
        margin: auto;
        animation: spin 1s linear infinite;
      }

      .order-box {
        background: #f9f2fc;
        padding: 10px 15px;
        border-radius: 8px;
        margin-top: 10px;
        font-size: 14px;
        color: #555;
      }
      .order-box strong {
        color: var(--primary);
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div id="icon-area"></div>

      <h1 id="status-title">Payment Status</h1>

      <p id="status-message"></p>
      <p id="orderId-div"></p>

      <a id="action-btn" class="btn">Continue</a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("order_id");
      const status = params.get("status");

      const title = document.getElementById("status-title");
      const message = document.getElementById("status-message");
      const orderDiv = document.getElementById("orderId-div");
      const iconArea = document.getElementById("icon-area");
      const actionBtn = document.getElementById("action-btn");

      orderDiv.innerHTML = `
  <div class="order-box">
    <strong>Order ID:</strong> ${orderId}<br>
    <small>Please keep this ID for future reference.</small>
  </div>
`;

      const icons = {
        CHARGED: `
        <svg class="status-icon" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" stroke="#28a745" stroke-width="6" fill="none"/>
          <polyline points="30,55 45,70 70,40" stroke="#28a745" stroke-width="6" fill="none"/>
        </svg>
      `,
        FAILED: `
        <svg class="status-icon" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" stroke="#d9534f" stroke-width="6" fill="none"/>
          <line x1="30" y1="30" x2="70" y2="70" stroke="#d9534f" stroke-width="6"/>
          <line x1="70" y1="30" x2="30" y2="70" stroke="#d9534f" stroke-width="6"/>
        </svg>
      `,
        PENDING: `<div class="loader"></div>`,
      };

      function startPolling() {
        console.log("Polling started");
        setInterval(async () => {
          try {
            const res = await fetch(
              `https://api.migrainedoctoronline.com/order-status?order_id=${orderId}`,
              {
                method:"POST",
                body:JSON.stringify({
                  order_id:orderId
                }),
              },
            );
            const data = await res.json();

            console.log("Polled status:", data.status);

            if (data.status === "CHARGED") {
              showSuccess();
            }

            if (
              data.status === "AUTHENTICATION_FAILED" ||
              data.status === "AUTHORIZATION_FAILED" ||
              data.status == "JUSPAY_DECLINED"
            ) {
              showFailure();
            }
          } catch (err) {
            console.error("Polling error:", err);
          }
        }, 3000);
      }

      function showSuccess() {
        iconArea.innerHTML = icons.CHARGED;
        title.textContent = "Payment Successful";
        message.textContent = "Your payment has been completed successfully.";
        actionBtn.textContent = "Go to Home";
        actionBtn.href = "index.html";
      }

      function showFailure() {
        iconArea.innerHTML = icons.FAILED;
        title.textContent = "Payment Failed";
        message.textContent =
          "Your payment could not be completed. Please try again.";
        actionBtn.textContent = "Book Appointment Again";
        actionBtn.href = "appointment.html";
      }

      function showPending() {
        iconArea.innerHTML = icons.PENDING;
        title.textContent = "Processing Payment";
        message.textContent = "Please wait while we confirm your transaction.";
        actionBtn.style.display = "none"; // hide button during pending
        startPolling();
      }

      // Initial status handling
      if (status === "CHARGED") {
        showSuccess();
      } else if (
        status === "AUTHENTICATION_FAILED" ||
        status === "AUTHORIZATION_FAILED" ||
        status === "JUSPAY_DECLINED"
      ) {
        showFailure();
      } else if (status === "PENDING_VBV" || status === "AUTHORIZING") {
        showPending();
      }
    </script>
  </body>
</html>
